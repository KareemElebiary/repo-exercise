<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduVault – Student Image Portal</title>
  <meta name="description" content="Secure student image upload portal with Google Drive integration and admin grading panel." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <!-- Animated background particles -->
  <div class="bg-particles" id="bgParticles"></div>

  <!-- Login Container -->
  <div class="login-container" id="loginContainer">
    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="10" fill="url(#lg1)"/>
          <path d="M18 8L28 13V23L18 28L8 23V13L18 8Z" stroke="white" stroke-width="2" stroke-linejoin="round" fill="none"/>
          <path d="M18 8V18M18 18L28 13M18 18L8 13M18 18V28" stroke="white" stroke-width="1.5" opacity="0.6"/>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-text">
        <h1>EduVault</h1>
        <p>Student Image Portal</p>
      </div>
    </div>

    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" id="tabStudent" onclick="switchTab('student')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Student
      </button>
      <button class="tab-btn" id="tabAdmin" onclick="switchTab('admin')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Admin
      </button>
    </div>

    <!-- Student Login Form -->
    <form class="login-form" id="studentForm" onsubmit="loginStudent(event)">
      <div class="form-group">
        <label for="studentId">Student ID</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <input type="text" id="studentId" placeholder="Enter your student ID" required autocomplete="off" />
        </div>
      </div>
      <div class="form-group">
        <label for="studentPassword">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="studentPassword" placeholder="Enter your password" required />
          <button type="button" class="toggle-pw" onclick="togglePw('studentPassword', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-error" id="studentError"></div>
      <button type="submit" class="btn-primary" id="studentLoginBtn">
        <span>Sign In</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <div class="form-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
      </div>
    </form>

    <!-- Admin Login Form -->
    <form class="login-form hidden" id="adminForm" onsubmit="loginAdmin(event)">
      <div class="form-group">
        <label for="adminUsername">Admin Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <input type="text" id="adminUsername" placeholder="Enter admin username" required autocomplete="off" />
        </div>
      </div>
      <div class="form-group">
        <label for="adminPassword">Admin Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="adminPassword" placeholder="Enter admin password" required />
          <button type="button" class="toggle-pw" onclick="togglePw('adminPassword', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-error" id="adminError"></div>
      <button type="submit" class="btn-primary admin-btn" id="adminLoginBtn">
        <span>Admin Sign In</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
