<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – EduVault</title>
    <meta name="description" content="Register a new student account on EduVault." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="login-page">

    <div class="bg-particles" id="bgParticles"></div>

    <div class="login-container register-container">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="36" height="36" rx="10" fill="url(#lg1)" />
                    <path d="M18 8L28 13V23L18 28L8 23V13L18 8Z" stroke="white" stroke-width="2" stroke-linejoin="round"
                        fill="none" />
                    <path d="M18 8V18M18 18L28 13M18 18L8 13M18 18V28" stroke="white" stroke-width="1.5"
                        opacity="0.6" />
                    <defs>
                        <linearGradient id="lg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6366f1" />
                            <stop offset="1" stop-color="#8b5cf6" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="brand-text">
                <h1>EduVault</h1>
                <p>Create Your Account</p>
            </div>
        </div>

        <form class="login-form" id="registerForm" onsubmit="registerStudent(event)">
            <div class="form-row">
                <div class="form-group">
                    <label for="regFirstName">First Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="regFirstName" placeholder="First name" required autocomplete="off" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="regLastName">Last Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="regLastName" placeholder="Last name" required autocomplete="off" />
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="regStudentId">Student ID</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
                    </svg>
                    <input type="text" id="regStudentId" placeholder="e.g. 20231234" required autocomplete="off" />
                </div>
            </div>

            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg>
                    <input type="email" id="regEmail" placeholder="your@email.com" required autocomplete="off" />
                </div>
            </div>

            <div class="form-group">
                <label for="regPassword">Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" id="regPassword" placeholder="Create a password" required />
                    <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="regConfirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required />
                    <button type="button" class="toggle-pw" onclick="togglePw('regConfirmPassword', this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Password strength indicator -->
            <div class="pw-strength" id="pwStrength">
                <div class="pw-bars">
                    <span class="bar" id="bar1"></span>
                    <span class="bar" id="bar2"></span>
                    <span class="bar" id="bar3"></span>
                    <span class="bar" id="bar4"></span>
                </div>
                <span class="pw-label" id="pwLabel">Password strength</span>
            </div>

            <div class="form-error" id="registerError"></div>
            <div class="form-success" id="registerSuccess"></div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <span>Create Account</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>

            <div class="form-footer">
                <p>Already have an account? <a href="index.html">Sign In</a></p>
            </div>
        </form>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
